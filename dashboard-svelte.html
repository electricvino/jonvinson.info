<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Activity Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --background: 0 0% 100%;
      --foreground: 222.2 84% 4.9%;
      --card: 0 0% 100%;
      --card-foreground: 222.2 84% 4.9%;
      --popover: 0 0% 100%;
      --popover-foreground: 222.2 84% 4.9%;
      --primary: 222.2 47.4% 11.2%;
      --primary-foreground: 210 40% 98%;
      --secondary: 210 40% 96.1%;
      --secondary-foreground: 222.2 47.4% 11.2%;
      --muted: 210 40% 96.1%;
      --muted-foreground: 215.4 16.3% 46.9%;
      --accent: 210 40% 96.1%;
      --accent-foreground: 222.2 47.4% 11.2%;
      --destructive: 0 84.2% 60.2%;
      --destructive-foreground: 210 40% 98%;
      --border: 214.3 31.8% 91.4%;
      --input: 214.3 31.8% 91.4%;
      --ring: 222.2 84% 4.9%;
      --radius: 0.5rem;
    }

    .dark {
      --background: 222.2 84% 4.9%;
      --foreground: 210 40% 98%;
      --card: 222.2 84% 4.9%;
      --card-foreground: 210 40% 98%;
      --popover: 222.2 84% 4.9%;
      --popover-foreground: 210 40% 98%;
      --primary: 210 40% 98%;
      --primary-foreground: 222.2 47.4% 11.2%;
      --secondary: 217.2 32.6% 17.5%;
      --secondary-foreground: 210 40% 98%;
      --muted: 217.2 32.6% 17.5%;
      --muted-foreground: 215 20.2% 65.1%;
      --accent: 217.2 32.6% 17.5%;
      --accent-foreground: 210 40% 98%;
      --destructive: 0 62.8% 30.6%;
      --destructive-foreground: 210 40% 98%;
      --border: 217.2 32.6% 17.5%;
      --input: 217.2 32.6% 17.5%;
      --ring: 212.7 26.8% 83.9%;
    }

    * {
      border-color: hsl(var(--border));
    }

    body {
      background-color: hsl(var(--background));
      color: hsl(var(--foreground));
    }
  </style>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            border: "hsl(var(--border))",
            input: "hsl(var(--input))",
            ring: "hsl(var(--ring))",
            background: "hsl(var(--background))",
            foreground: "hsl(var(--foreground))",
            primary: {
              DEFAULT: "hsl(var(--primary))",
              foreground: "hsl(var(--primary-foreground))",
            },
            secondary: {
              DEFAULT: "hsl(var(--secondary))",
              foreground: "hsl(var(--secondary-foreground))",
            },
            destructive: {
              DEFAULT: "hsl(var(--destructive))",
              foreground: "hsl(var(--destructive-foreground))",
            },
            muted: {
              DEFAULT: "hsl(var(--muted))",
              foreground: "hsl(var(--muted-foreground))",
            },
            accent: {
              DEFAULT: "hsl(var(--accent))",
              foreground: "hsl(var(--accent-foreground))",
            },
            popover: {
              DEFAULT: "hsl(var(--popover))",
              foreground: "hsl(var(--popover-foreground))",
            },
            card: {
              DEFAULT: "hsl(var(--card))",
              foreground: "hsl(var(--card-foreground))",
            },
          },
          borderRadius: {
            lg: "var(--radius)",
            md: "calc(var(--radius) - 2px)",
            sm: "calc(var(--radius) - 4px)",
          },
        },
      },
    }
  </script>
</head>
<body>
  <div id="app"></div>

  <script type="module">
    import { mount } from 'https://esm.sh/svelte@5';
    
    // Card component
    const Card = {
      render(props, slots) {
        return {
          html: `<div class="rounded-lg border bg-card text-card-foreground shadow-sm ${props.className || ''}">${slots?.default?.() || ''}</div>`
        };
      }
    };

    // CardHeader component
    const CardHeader = {
      render(props, slots) {
        return {
          html: `<div class="flex flex-col space-y-1.5 p-6 ${props.className || ''}">${slots?.default?.() || ''}</div>`
        };
      }
    };

    // CardTitle component
    const CardTitle = {
      render(props, slots) {
        return {
          html: `<h3 class="text-lg font-semibold leading-none tracking-tight ${props.className || ''}">${slots?.default?.() || ''}</h3>`
        };
      }
    };

    // CardContent component
    const CardContent = {
      render(props, slots) {
        return {
          html: `<div class="p-6 pt-0 ${props.className || ''}">${slots?.default?.() || ''}</div>`
        };
      }
    };

    // StatsCard component helper
    function renderStatsCard(title, value, subtitle, color, percentage, iconSvg, clickHandler = null, cardId = null) {
      const colors = { 
        blue: 'bg-blue-500', 
        purple: 'bg-purple-500', 
        green: 'bg-green-500', 
        orange: 'bg-orange-500', 
        red: 'bg-red-500' 
      };
      const clickAttr = clickHandler ? `data-clickable="true" data-card-id="${cardId}"` : '';
      const cursorClass = clickHandler ? 'cursor-pointer hover:shadow-lg transition-shadow' : '';
      return `
        <div class="rounded-lg border bg-card text-card-foreground shadow-sm ${cursorClass}" ${clickAttr}>
          <div class="flex flex-row items-center justify-between space-y-0 pb-2 p-6">
            <h3 class="text-sm font-medium">${title}</h3>
            ${iconSvg}
          </div>
          <div class="p-6 pt-0">
            <div class="text-2xl font-bold">${value}</div>
            <p class="text-xs text-muted-foreground">${subtitle}</p>
            <div class="mt-4 h-1 w-full bg-secondary rounded-full overflow-hidden">
              <div class="h-full ${colors[color]} rounded-full" style="width: ${Math.min(percentage, 100)}%"></div>
            </div>
          </div>
        </div>
      `;
    }

    // Dashboard App using Svelte 5 runes pattern
    const DashboardApp = {
      setup() {
        // Using Svelte 5 store-like reactivity with simple state
        let state = {
          darkMode: false,
          activeGraph: null, // 'steps', 'caloriesEaten', or 'caloriesBurned'
          activePieChart: null, // 'songs' or 'shows'
          stats: {
            shows: 12,
            showsChange: 3,
            songs: 2847,
            songsChange: 12,
            steps: 8432,
            caloriesEaten: 2150,
            caloriesBurned: 1850,
            caloriesBurnedChange: 320
          },
          weeklyData: [
            { day: 'Mon', steps: 6500, caloriesEaten: 2100, caloriesBurned: 1500 },
            { day: 'Tue', steps: 8200, caloriesEaten: 2300, caloriesBurned: 1800 },
            { day: 'Wed', steps: 10500, caloriesEaten: 1950, caloriesBurned: 2200 },
            { day: 'Thu', steps: 7800, caloriesEaten: 2500, caloriesBurned: 1600 },
            { day: 'Fri', steps: 9200, caloriesEaten: 2200, caloriesBurned: 1900 },
            { day: 'Sat', steps: 11200, caloriesEaten: 2800, caloriesBurned: 2400 },
            { day: 'Sun', steps: 8432, caloriesEaten: 2150, caloriesBurned: 1850 }
          ],
          recentActivity: [
            { type: 'exercise', name: 'Morning Run', time: '2 hours ago', value: '450 cal' },
            { type: 'music', name: 'Lo-Fi Beats Playlist', time: '3 hours ago', value: '47 songs' },
            { type: 'movie', name: 'The Matrix', time: '5 hours ago', value: '2h 16m' },
            { type: 'meal', name: 'Lunch - Salad Bowl', time: '6 hours ago', value: '420 cal' },
            { type: 'exercise', name: 'Yoga Session', time: 'Yesterday', value: '180 cal' }
          ],
          topGenres: [
            { name: 'Drama', percentage: 35 },
            { name: 'Action', percentage: 25 },
            { name: 'Comedy', percentage: 20 },
            { name: 'Sci-Fi', percentage: 15 },
            { name: 'Documentary', percentage: 5 }
          ],
          weeklyGoals: [
            { name: 'Steps', current: 58432, target: 70000 },
            { name: 'Workouts', current: 4, target: 5 },
            { name: 'Shows', current: 12, target: 15 },
            { name: 'Songs', current: 2847, target: 3000 }
          ],
          mediaData: {
            songs: {
              byGenre: [
                { name: 'Rock', value: 847, color: '#ef4444' },
                { name: 'Pop', value: 723, color: '#3b82f6' },
                { name: 'Hip Hop', value: 534, color: '#8b5cf6' },
                { name: 'Electronic', value: 412, color: '#10b981' },
                { name: 'Jazz', value: 231, color: '#f59e0b' },
                { name: 'Classical', value: 100, color: '#6b7280' }
              ]
            },
            shows: {
              byGenre: [
                { name: 'Drama', value: 4, color: '#ef4444' },
                { name: 'Comedy', value: 3, color: '#3b82f6' },
                { name: 'Action', value: 2, color: '#8b5cf6' },
                { name: 'Sci-Fi', value: 2, color: '#10b981' },
                { name: 'Documentary', value: 1, color: '#f59e0b' }
              ]
            }
          }
        };

        const subscribers = new Set();
        
        function subscribe(callback) {
          subscribers.add(callback);
          return () => subscribers.delete(callback);
        }

        function notify() {
          subscribers.forEach(cb => cb(state));
        }

        function toggleTheme() {
          state.darkMode = !state.darkMode;
          document.documentElement.classList.toggle('dark', state.darkMode);
          notify();
        }

        function showGraph(graphType) {
          state.activeGraph = graphType;
          state.activePieChart = null;
          notify();
        }

        function showPieChart(pieType) {
          state.activePieChart = pieType;
          state.activeGraph = null;
          notify();
        }

        function closeGraph() {
          state.activeGraph = null;
          state.activePieChart = null;
          notify();
        }

        function getState() {
          return state;
        }

        return { subscribe, getState, toggleTheme, showGraph, showPieChart, closeGraph };
      },

      render(state) {
        const { darkMode, stats, weeklyData, recentActivity, topGenres, weeklyGoals, activeGraph, activePieChart, mediaData } = state;

        let graphModal = '';
        if (activeGraph) {
          graphModal = this.renderGraphModal(activeGraph, weeklyData);
        } else if (activePieChart) {
          graphModal = this.renderPieChartModal(activePieChart, mediaData);
        }

        return `
          <div class="min-h-screen bg-background">
            <!-- Header -->
            <header class="border-b bg-card">
              <div class="flex h-16 items-center px-4 md:px-8">
                <div class="flex items-center gap-2 font-bold text-xl">
                  <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-primary"><rect width="7" height="9" x="2" y="2" rx="1"/><rect width="7" height="5" x="10" y="2" rx="1"/><rect width="7" height="9" x="4" y="11" rx="1"/><rect width="7" height="5" x="14" y="11" rx="1"/></svg>
                  <span>Activity Dashboard</span>
                </div>
                <div class="ml-auto flex items-center gap-4">
                  <button 
                    id="theme-toggle"
                    class="inline-flex items-center justify-center rounded-md text-sm font-medium ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 border border-input bg-background hover:bg-accent hover:text-accent-foreground h-10 w-10"
                  >
                    ${darkMode ? 
                      `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>` :
                      `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>`
                    }
                  </button>
                  <div class="relative">
                    <img 
                      src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" 
                      alt="User" 
                      class="h-8 w-8 rounded-full border"
                    />
                  </div>
                </div>
              </div>
            </header>

            <div class="flex">
              <!-- Sidebar -->
              <aside class="hidden md:block w-64 border-r bg-card min-h-[calc(100vh-4rem)]">
                <nav class="flex flex-col gap-2 p-4">
                  <a href="#" class="flex items-center gap-3 rounded-lg bg-primary px-3 py-2 text-primary-foreground transition-all hover:text-primary-foreground">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="9" x="2" y="2" rx="1"/><rect width="7" height="5" x="10" y="2" rx="1"/><rect width="7" height="9" x="4" y="11" rx="1"/><rect width="7" height="5" x="14" y="11" rx="1"/></svg>
                    Overview
                  </a>
                  <a href="#" class="flex items-center gap-3 rounded-lg px-3 py-2 text-muted-foreground transition-all hover:bg-accent hover:text-accent-foreground">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 14 4-4"/><path d="M3.34 19a10 10 0 1 1 17.32 0"/></svg>
                    Analytics
                  </a>
                  <a href="#" class="flex items-center gap-3 rounded-lg px-3 py-2 text-muted-foreground transition-all hover:bg-accent hover:text-accent-foreground">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                    Reports
                  </a>
                  <a href="#" class="flex items-center gap-3 rounded-lg px-3 py-2 text-muted-foreground transition-all hover:bg-accent hover:text-accent-foreground">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    Profile
                  </a>
                </nav>
              </aside>

              <!-- Main Content -->
              <main class="flex-1 p-4 md:p-8">
                <div class="flex items-center justify-between mb-8">
                  <div>
                    <h1 class="text-3xl font-bold tracking-tight">Dashboard</h1>
                    <p class="text-muted-foreground">Track your daily activities and health metrics.</p>
                  </div>
                  <div class="flex items-center gap-2">
                    <span class="text-sm text-muted-foreground">${new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</span>
                  </div>
                </div>

                <!-- Stats Grid -->
                <div class="grid gap-4 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 mb-8">
                  ${renderStatsCard('Shows & Movies', stats.shows, `+${stats.showsChange} from last week`, 'blue', (stats.shows / 50) * 100, 
                    `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-muted-foreground"><rect width="20" height="15" x="2" y="7" rx="2" ry="2"/><polyline points="17 2 12 7 7 2"/></svg>`, true, 'shows')}
                  
                  ${renderStatsCard('Songs Played', stats.songs.toLocaleString(), `+${stats.songsChange}% from yesterday`, 'purple', (stats.songs / 500) * 100,
                    `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-muted-foreground"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>`, true, 'songs')}
                  
                  ${renderStatsCard('Steps Taken', stats.steps.toLocaleString(), 'Goal: 10,000/day', 'green', (stats.steps / 10000) * 100,
                    `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-muted-foreground"><line x1="22" x2="2" y1="12" y2="12"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/><line x1="6" x2="6.01" y1="16" y2="16"/><line x1="10" x2="10.01" y1="16" y2="16"/></svg>`, true, 'steps')}
                  
                  ${renderStatsCard('Calories Eaten', stats.caloriesEaten.toLocaleString(), 'Target: 2,500/day', 'orange', (stats.caloriesEaten / 2500) * 100,
                    `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-muted-foreground"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></svg>`, true, 'caloriesEaten')}
                  
                  ${renderStatsCard('Calories Burned', stats.caloriesBurned.toLocaleString(), `+${stats.caloriesBurnedChange} vs yesterday`, 'red', (stats.caloriesBurned / 3000) * 100,
                    `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-muted-foreground"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>`, true, 'caloriesBurned')}
                </div>

                <!-- Charts Section -->
                <div class="grid gap-4 md:grid-cols-2 lg:grid-cols-7 mb-8">
                  <!-- Activity Overview Chart -->
                  <div class="col-span-4 rounded-lg border bg-card text-card-foreground shadow-sm">
                    <div class="flex flex-col space-y-1.5 p-6">
                      <h3 class="text-lg font-semibold leading-none tracking-tight">Activity Overview</h3>
                      <p class="text-sm text-muted-foreground">Your activity trends over the past 7 days</p>
                    </div>
                    <div class="p-6 pt-0">
                      <div class="h-[300px] flex items-end justify-between gap-2 px-2">
                        ${weeklyData.map(day => `
                          <div class="flex flex-col items-center flex-1">
                            <div class="w-full flex flex-col gap-1">
                              <div 
                                class="w-full bg-blue-500 rounded-t transition-all duration-500 hover:opacity-80"
                                style="height: ${Math.min((day.steps / 12000) * 150, 150)}px"
                                title="Steps: ${day.steps.toLocaleString()}"
                              ></div>
                              <div 
                                class="w-full bg-orange-500 rounded-t transition-all duration-500 hover:opacity-80"
                                style="height: ${Math.min((day.caloriesEaten / 3000) * 100, 100)}px"
                                title="Calories: ${day.caloriesEaten}"
                              ></div>
                              <div 
                                class="w-full bg-red-500 rounded-t transition-all duration-500 hover:opacity-80"
                                style="height: ${Math.min((day.caloriesBurned / 3500) * 50, 50)}px"
                                title="Burned: ${day.caloriesBurned}"
                              ></div>
                            </div>
                            <span class="text-xs text-muted-foreground mt-2">${day.day}</span>
                          </div>
                        `).join('')}
                      </div>
                      <div class="flex items-center justify-center gap-6 mt-4">
                        <div class="flex items-center gap-2">
                          <div class="w-3 h-3 rounded-full bg-blue-500"></div>
                          <span class="text-xs text-muted-foreground">Steps</span>
                        </div>
                        <div class="flex items-center gap-2">
                          <div class="w-3 h-3 rounded-full bg-orange-500"></div>
                          <span class="text-xs text-muted-foreground">Calories Eaten</span>
                        </div>
                        <div class="flex items-center gap-2">
                          <div class="w-3 h-3 rounded-full bg-red-500"></div>
                          <span class="text-xs text-muted-foreground">Calories Burned</span>
                        </div>
                      </div>
                    </div>
                  </div>

                  <!-- Recent Activity -->
                  <div class="col-span-3 rounded-lg border bg-card text-card-foreground shadow-sm">
                    <div class="flex flex-col space-y-1.5 p-6">
                      <h3 class="text-lg font-semibold leading-none tracking-tight">Recent Activity</h3>
                      <p class="text-sm text-muted-foreground">Latest actions from today</p>
                    </div>
                    <div class="p-6 pt-0">
                      <div class="space-y-4">
                        ${recentActivity.map(activity => {
                          let icon = '';
                          let color = '';
                          if (activity.type === 'movie') { icon = '<rect width="20" height="15" x="2" y="7" rx="2" ry="2"/><polyline points="17 2 12 7 7 2"/>'; color = 'blue'; }
                          else if (activity.type === 'music') { icon = '<path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>'; color = 'purple'; }
                          else if (activity.type === 'exercise') { icon = '<path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>'; color = 'red'; }
                          else { icon = '<line x1="22" x2="2" y1="12" y2="12"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/><line x1="6" x2="6.01" y1="16" y2="16"/><line x1="10" x2="10.01" y1="16" y2="16"/>'; color = 'green'; }
                          return `
                            <div class="flex items-center gap-4">
                              <div class="h-9 w-9 rounded-full bg-primary/10 flex items-center justify-center">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-${color}-500">${icon}</svg>
                              </div>
                              <div class="flex-1 min-w-0">

      renderPieChartModal(activePieChart, mediaData) {

          },
          shows: {

            textColor: 'text-blue-500',
            bgColor: 'bg-blue-500/10',
            data: mediaData.shows.byGenre,
            total: mediaData.shows.byGenre.reduce((a, b) => a + b.value, 0)
          }
        };

        const config = pieConfig[activePieChart];
        const total = config.total;
        const radius = 140;
        const center = 150;
        
        // Calculate pie slices
        let currentAngle = -Math.PI / 2;
        const slices = config.data.map((item, index) => {
          const percentage = item.value / total;
          const angle = percentage * 2 * Math.PI;
          const startAngle = currentAngle;
          const endAngle = currentAngle + angle;
          
          // Calculate path coordinates
          const x1 = center + radius * Math.cos(startAngle);
          const y1 = center + radius * Math.sin(startAngle);
          const x2 = center + radius * Math.cos(endAngle);
          const y2 = center + radius * Math.sin(endAngle);
          const largeArcFlag = angle > Math.PI ? 1 : 0;
          
          const pathData = [
            `M ${center} ${center}`,
            `L ${x1} ${y1}`,
            `A ${radius} ${radius} 0 ${largeArcFlag} 1 ${x2} ${y2}`,
            'Z'
          ].join(' ');
          
          currentAngle += angle;
          
          return {
            ...item,
            percentage,
            pathData,
            delay: index * 150
          };
        });

        return `

                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                </button>
              </div>

              <!-- Main Content -->
              <div class="flex-1 flex flex-col lg:flex-row gap-8 min-h-0">
                <!-- Left: Info Panel (updates on hover) -->
                <div id="pie-info-panel" class="lg:w-80 bg-card rounded-lg border p-6 flex flex-col justify-center">
                  <div class="text-center lg:text-left">
                    <p class="text-sm text-muted-foreground mb-2">Hover over a slice to see details</p>
                    <p class="text-4xl font-bold ${config.textColor}">${total.toLocaleString()}</p>
                    <p class="text-sm text-muted-foreground mt-1">Total ${activePieChart}</p>
                  </div>
                </div>

                <!-- Right: Pie Chart -->
                <div class="flex-1 flex items-center justify-center bg-card rounded-lg border p-6">
                  <svg width="300" height="300" viewBox="0 0 300 300" id="pie-chart-svg">
                    <!-- Background circle -->
                    <circle cx="150" cy="150" r="140" fill="hsl(var(--card))" stroke="hsl(var(--border))" stroke-width="2"/>
                    
                    ${slices.map((slice, index) => `
                      <path
                        d="${slice.pathData}"
                        fill="${slice.color}"
                        stroke="white"
                        stroke-width="2"
                        class="pie-slice cursor-pointer transition-all duration-300 hover:opacity-80"
                        style="opacity: 0; transform-origin: center;"
                        data-index="${index}"
                        data-name="${slice.name}"
                        data-value="${slice.value}"
                        data-percentage="${(slice.percentage * 100).toFixed(1)}"
                        data-color="${slice.color}"
                      />
                    `).join('')}
                    
                    <!-- Center hole for donut effect -->
                    <circle cx="150" cy="150" r="50" fill="hsl(var(--card))"/>
                    
                    <!-- Center text -->
                    <text x="150" y="145" text-anchor="middle" class="fill-foreground text-sm font-medium">
                      ${total.toLocaleString()}
                    </text>
                    <text x="150" y="160" text-anchor="middle" class="fill-muted-foreground text-xs">
                      Total
                    </text>
                  </svg>
                </div>
              </div>

              <!-- Legend -->
              <div class="mt-6 grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4">
                ${slices.map((slice, index) => `
                  <div class="flex items-center gap-2 p-2 rounded-lg bg-card border hover:bg-accent/50 transition-colors cursor-pointer legend-item" data-slice-index="${index}">
                    <div class="w-4 h-4 rounded" style="background-color: ${slice.color}"></div>
                    <div class="flex-1 min-w-0">
                      <p class="text-sm font-medium truncate">${slice.name}</p>
                      <p class="text-xs text-muted-foreground">${slice.value.toLocaleString()} (${(slice.percentage * 100).toFixed(1)}%)</p>
                    </div>
                  </div>
                `).join('')}
              </div>
            </div>
          </div>

          <style>
            @keyframes pieSliceEnter {

      mount(target) {
        const { subscribe, getState, toggleTheme, showGraph, showPieChart, closeGraph } = this.setup();
        
        const render = () => {
          const state = getState();
          target.innerHTML = this.render(state);
          
          // Attach event listeners after render
          const toggleBtn = target.querySelector('#theme-toggle');
          if (toggleBtn) {
            toggleBtn.addEventListener('click', toggleTheme);
          }

          // Attach click handlers to clickable stat cards
          const clickableCards = target.querySelectorAll('[data-clickable="true"]');
          clickableCards.forEach(card => {
            card.addEventListener('click', () => {
              const cardId = card.getAttribute('data-card-id');
              if (cardId) {
                if (cardId === 'songs' || cardId === 'shows') {
                  showPieChart(cardId);
                } else {
                  showGraph(cardId);
                }
              }
            });
          });

          // Attach close handler to graph modal
          const closeGraphBtn = target.querySelector('#close-graph');
          if (closeGraphBtn) {
            closeGraphBtn.addEventListener('click', closeGraph);
          }

          // Attach close handler to pie modal
          const closePieBtn = target.querySelector('#close-pie');
          if (closePieBtn) {
            closePieBtn.addEventListener('click', closeGraph);
          }

          // Animate bars in the graph modal
          if (state.activeGraph) {
            setTimeout(() => {
              const bars = target.querySelectorAll('[data-height]');
              bars.forEach((bar, index) => {
                const height = bar.getAttribute('data-height');
                const delay = index * 100;
                setTimeout(() => {
                  bar.style.transition = 'height 0.6s ease-out';
                  bar.style.height = height;
                }, delay);
              });
              
              const labels = target.querySelectorAll('.value-label');
              labels.forEach((label, index) => {
                const delay = (index * 100) + 400;
                setTimeout(() => {
                  label.style.transition = 'opacity 0.4s ease-out';
                  label.style.opacity = '1';
                }, delay);
              });
            }, 50);
          }

          // Animate pie slices with staggered delay and add hover handlers
          if (state.activePieChart) {
            const slices = target.querySelectorAll('.pie-slice');
            slices.forEach((slice, index) => {
              const delay = index * 150;
              setTimeout(() => {
                slice.style.opacity = '1';
              }, delay);
            });

            const pieSlices = target.querySelectorAll('.pie-slice');
            const infoPanel = target.querySelector('#pie-info-panel');
            
            pieSlices.forEach(slice => {
              slice.addEventListener('mouseenter', () => {
                const name = slice.getAttribute('data-name');
                const value = slice.getAttribute('data-value');
                const percentage = slice.getAttribute('data-percentage');
                const color = slice.getAttribute('data-color');
                
                if (infoPanel) {
                  infoPanel.innerHTML = `
                    <div class="text-center lg:text-left">
                      <div class="flex items-center gap-2 mb-3">
                        <div class="w-6 h-6 rounded" style="background-color: ${color}"></div>
                        <h3 class="text-xl font-bold">${name}</h3>
                      </div>
                      <p class="text-4xl font-bold" style="color: ${color}">${parseInt(value).toLocaleString()}</p>
                      <p class="text-lg text-muted-foreground mt-1">${percentage}% of total</p>
                      <div class="mt-4 pt-4 border-t">
                        <p class="text-sm text-muted-foreground">Click slice for more details</p>
                      </div>
                    </div>
                  `;
                }
                
                slice.style.filter = 'brightness(1.15)';
                slice.style.transform = 'scale(1.03)';
              });
              
              slice.addEventListener('mouseleave', () => {
                if (infoPanel) {
                  const total = state.mediaData[state.activePieChart].byGenre.reduce((a, b) => a + b.value, 0);
                  infoPanel.innerHTML = `
                    <div class="text-center lg:text-left">
                      <p class="text-sm text-muted-foreground mb-2">Hover over a slice to see details</p>
                      <p class="text-4xl font-bold" style="color: inherit;">${total.toLocaleString()}</p>
                      <p class="text-sm text-muted-foreground mt-1">Total ${state.activePieChart}</p>
                    </div>
                  `;
                }
                
                slice.style.filter = 'brightness(1)';
                slice.style.transform = 'scale(1)';
              });
            });

            // Add hover handlers for legend items
            const legendItems = target.querySelectorAll('.legend-item');
            legendItems.forEach((item, index) => {
              item.addEventListener('mouseenter', () => {
                const slice = pieSlices[index];
                if (slice) {
                  slice.dispatchEvent(new Event('mouseenter'));
                }
              });
              
              item.addEventListener('mouseleave', () => {
                const slice = pieSlices[index];
                if (slice) {
                  slice.dispatchEvent(new Event('mouseleave'));
                }
              });
            });
          }

          // Add Escape key handler for closing modals
          if (state.activeGraph || state.activePieChart) {
            const handleEscape = (e) => {
              if (e.key === 'Escape') {
                closeGraph();
                document.removeEventListener('keydown', handleEscape);
              }
            };
            document.addEventListener('keydown', handleEscape);
          }
        };

        subscribe(render);
        render();
      }
    };

    DashboardApp.mount(document.getElementById('app'));
  </script>
</body>
</html>
